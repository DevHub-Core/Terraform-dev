name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
        env:
          TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
          TF_VAR_github_org: ${{ secrets.GH_ORG }}
          TF_VAR_installation_id_renovate: ${{ secrets.INSTALLATION_ID_RENOVATE }}